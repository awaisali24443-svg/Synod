services:
  # 1. The Python Backend
  - type: web
    name: synod-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0

  # 2. The React Frontend
  - type: static
    name: synod-frontend
    env: static
    buildCommand: npm install && npm run build
    publish: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
        
